<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard Tabungan Qurban</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Dashboard Tabungan Qurban</h1>
      </div>
    </header>

    <main>
      <section class="kpis" aria-label="Ringkasan tabungan qurban">
        <article class="kpi">
          <span>Total Dana</span>
          <strong id="totalFunds">Rp0</strong>
        </article>
        <article class="kpi">
          <span>Peserta</span>
          <strong id="totalParticipants">0</strong>
        </article>
        <article class="kpi">
          <span>Peserta Aktif</span>
          <strong id="activeParticipants">0</strong>
        </article>
        <article class="kpi accent payment-kpi">
          <span>Pembayaran Qurban</span>
          <button class="qris-button" id="openQris" type="button">Tampilkan QRIS</button>
        </article>
      </section>

      <section class="toolbar" aria-label="Kontrol tabel peserta">
        <label class="search-box">
          <span>Cari</span>
          <input id="searchInput" type="search" placeholder="Nama peserta" />
        </label>
        <label class="select-box">
          <span>Status</span>
          <select id="statusFilter">
            <option value="all">Semua</option>
            <option value="AKTIF">Aktif</option>
            <option value="BELUM SETOR">Belum setor</option>
          </select>
        </label>
      </section>

      <section class="panel table-panel" aria-label="Detail peserta">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Detail Peserta</p>
            <h2>Setoran dan Status</h2>
          </div>
          <span id="rowCount">0 data</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Nama</th>
                <th>Total</th>
                <th>Status</th>
                <th>Rekap Bulanan</th>
              </tr>
            </thead>
            <tbody id="participantRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <dialog class="qris-dialog" id="qrisDialog" aria-labelledby="qrisTitle">
      <div class="qris-dialog__header">
        <div>
          <p class="eyebrow">Pembayaran</p>
          <h2 id="qrisTitle">QRIS Tabungan Qurban</h2>
        </div>
        <button class="dialog-close" id="closeQris" type="button" aria-label="Tutup QRIS" title="Tutup">×</button>
      </div>
      <div class="qris-frame">
        <img id="qrisImage" src="qris.png" alt="Kode QRIS untuk pembayaran tabungan qurban" />
        <p class="qris-fallback" id="qrisFallback" hidden>Gambar QRIS belum tersedia.</p>
      </div>
    </dialog>

    <script src="config.js?v=9"></script>
    <script src="data.js?v=9"></script>
    <script src="script.js?v=9"></script>
  </body>
</html>
